<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller Speed - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #004a87;
            --secondary: #00a1df;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background: var(--light);
        }

        .page-header {
            background: linear-gradient(135deg, rgba(0,74,135,0.92), rgba(0,161,223,0.88));
            color: white;
            padding: 70px 0 50px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.35);
        }

        .page-header p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.95;
        }

        .section {
            padding: 60px 0 80px;
        }

        .users-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-top: 5px solid var(--secondary);
            padding: 1.5rem;
        }

        .table thead th {
            background: var(--primary);
            color: white;
            border: none;
        }

        .table td {
            vertical-align: middle;
        }

        .empty-state {
            background: #e9f7ff;
            border: 1px solid #b9e8ff;
            color: var(--primary);
            border-radius: 10px;
            padding: 1rem 1.2rem;
            margin: 0;
        }

        .footer {
            background: var(--dark);
            color: white;
            padding: 40px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <header class="page-header">
        <div class="container">
            <h1><i class="fas fa-users me-2"></i>Usuarios</h1>
            <p>Listado de usuarios registrados en Roller Speed</p>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="users-card">
                <div th:if="${datosUsuarios.isEmpty()}" class="empty-state">
                    No hay usuarios registrados por el momento.
                </div>

                <div th:unless="${datosUsuarios.isEmpty()}" class="table-responsive">
                    <table class="table table-striped table-hover mb-0">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Correo</th>
                                <th>Contrasena</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="usuario : ${datosUsuarios}">
                                <td th:text="${usuario.id}"></td>
                                <td th:text="${usuario.username}"></td>
                                <td th:text="${usuario.email}"></td>
                                <td th:text="${usuario.password}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
